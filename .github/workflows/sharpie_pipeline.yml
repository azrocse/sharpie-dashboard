name: Sharpie Pipeline
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  sharpie:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f src/requirements.txt ]; then pip install -r src/requirements.txt; fi

      - name: Ejecutar Sharpie
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          python -B src/main.py

      # PASO DE DIAGNÓSTICO: Nos va a decir en el log dónde quedó el index.html
      - name: Diagnosticar archivos generados
        run: |
          echo "=== Listando archivos en la raíz ==="
          ls -la
          echo "=== Buscando index.html en todo el proyecto ==="
          find . -name "index.html"

      # Si tu script genera el archivo dentro de 'src/', cambia path: '.' por path: './src'
      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
